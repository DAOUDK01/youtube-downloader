<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube to MP3 Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title">Enter a YouTube video URL</h1>
      <div class="input-group">
        <input
          type="text"
          id="youtube-url"
          placeholder="youtube.com/watch?v="
          autocomplete="off"
        />
        <div class="action-group">
          <span class="format-pill">.mp3</span>
          <button id="convert-btn" class="btn-convert">Convert</button>
        </div>
      </div>

      <div id="action-buttons" class="action-buttons hidden">
        <button id="download-btn" class="btn-download">Download</button>
        <button id="next-btn" class="btn-next">Next</button>
      </div>
      <div id="status-message" class="status-message hidden"></div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
